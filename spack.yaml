spack:
  definitions:
  - _name: [access-issm]
  - _version: [2026.05.0]
  specs:
  - access-issm
  packages:
    issm:
      require:
      - '@git.2026.04.16'
      - +wrappers
      - +py-tools
      - ~ad
      - +production

    python:
      require:
      - '@3.11.14'

    py-numpy:
      require:
      - '@1.26.4'

    openmpi:
      require:
      - '@4.1.5'

    access-triangle:
      require:
      - '@1.6.1'

    petsc:
      require:
      - '@3.21.1'

    metis:
      require:
      - '@5.1.0'

    mumps:
      require:
      - '@5.6.2'

    parmetis:
      require:
      - '@4.0.3'

    netlib-scalapack:
      require:
      - '@2.2.0'

    autoconf:
      require:
      - '@2.72'

    automake:
      require:
      - '@1.16.5'

    libtool:
      require:
      - '@2.4.7'

    m4:
      require:
      - '@1.4.19'

    m1qn3:
      require:
      - '@3.3'

    # Wokaround due to https://github.com/spack/spack-packages/pull/3644
    re2c:
      require:
      - '@3.1'

    # Compilers
    c:
      require:
      - 'gcc@13.2.0'
    cxx:
      require:
      - 'gcc@13.2.0'
    fortran:
      require:
      - 'gcc@13.2.0'

    # “all” can remain empty if you aren’t forcing any particular compiler / MPI
    all:
      prefer:
      - 'target=x86_64'
  # Create a unified view of all installed packages
  view: true
  # Make the solver unify dependencies
  concretizer:
    unify: true
